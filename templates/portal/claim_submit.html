{% extends "portal/base_portal.html" %}
{% block main %}
<h1 class="text-2xl font-semibold">Submit a claim</h1>
<form method="post" enctype="multipart/form-data" class="mt-6 max-w-3xl space-y-5 rounded-2xl border border-zinc-200/80 bg-white p-6 shadow-soft dark:border-zinc-800 dark:bg-zinc-900">
  {% csrf_token %}
  {% if form.non_field_errors %}<div class="text-sm text-rose-600">{{ form.non_field_errors }}</div>{% endif %}
  <div class="grid gap-4 md:grid-cols-2">
    {% for field in form %}
    <div class="{% if field.name == 'damage_description' or field.name == 'suspected_root_cause_customer' %}md:col-span-2{% endif %}">
      <label class="block text-xs font-semibold uppercase tracking-wide text-zinc-500">{{ field.label }}</label>
      <div class="mt-1">{{ field }}</div>
      {% if field.errors %}<p class="mt-1 text-xs text-rose-600">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
  </div>
  <div>
    <label class="block text-xs font-semibold uppercase tracking-wide text-zinc-500">Attachments</label>
    <input type="file" name="attachments" multiple class="mt-2 w-full text-sm">
  </div>
  <button class="rounded-2xl bg-violet-600 px-6 py-3 text-sm font-semibold text-white hover:bg-violet-500">Submit claim</button>
</form>
{% endblock %}
