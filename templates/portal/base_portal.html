{% extends "base.html" %}
{% block body %}
<div class="flex min-h-0 flex-1 flex-col bg-gradient-to-b from-zinc-50 to-white dark:from-zinc-950 dark:to-zinc-900">
  <header class="shrink-0 border-b border-zinc-200/80 bg-white/80 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/80">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-y-3 px-4 py-4">
      <div class="flex items-center gap-2">
        <div class="h-9 w-9 shrink-0 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 shadow-soft"></div>
        <div>
          <div class="text-xs font-semibold uppercase tracking-wide text-zinc-500">Nexus Resolve</div>
          <div class="text-sm font-semibold">Distributor portal</div>
        </div>
      </div>
      {% with url_name=request.resolver_match.url_name|default:"" %}
      <nav class="flex flex-wrap items-center justify-end gap-1 text-sm font-medium sm:gap-2">
        <a href="{% url 'portal_home' %}" class="inline-flex items-center rounded-lg px-3 py-2 text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800 dark:hover:text-zinc-100 {% if url_name == 'portal_home' %}bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-100{% endif %}">Home</a>
        <a href="{% url 'portal_claims' %}" class="inline-flex items-center rounded-lg px-3 py-2 text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800 dark:hover:text-zinc-100 {% if url_name == 'portal_claims' %}bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-100{% endif %}">Claims</a>
        <a href="{% url 'portal_claim_submit' %}" class="inline-flex items-center rounded-lg px-3 py-2 text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800 dark:hover:text-zinc-100 {% if url_name == 'portal_claim_submit' %}bg-violet-100 font-semibold text-violet-900 ring-1 ring-violet-300 dark:bg-violet-950/50 dark:text-violet-200 dark:ring-violet-700{% endif %}">New claim</a>
        {% if request.user.role != 'distributor' %}
        <a href="{% url 'account_telegram' %}" class="inline-flex items-center rounded-lg px-3 py-2 text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-300 dark:hover:bg-zinc-800 dark:hover:text-zinc-100 {% if request.resolver_match and request.resolver_match.url_name == 'account_telegram' %}bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-zinc-100{% endif %}">Telegram</a>
        {% endif %}
        <a href="{% url 'logout' %}" class="inline-flex items-center rounded-lg px-3 py-2 text-zinc-500 transition-colors hover:bg-zinc-100 hover:text-zinc-800 dark:text-zinc-400 dark:hover:bg-zinc-800">Sign out</a>
      </nav>
      {% endwith %}
    </div>
  </header>
  <main class="mx-auto w-full max-w-6xl flex-1 px-4 py-10">
    {% block main %}{% endblock %}
  </main>
</div>
{% endblock %}
