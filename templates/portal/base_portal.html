{% extends "base.html" %}
{% block body %}
<div class="min-h-full bg-gradient-to-b from-zinc-50 to-white dark:from-zinc-950 dark:to-zinc-900">
  <header class="border-b border-zinc-200/80 bg-white/80 backdrop-blur dark:border-zinc-800 dark:bg-zinc-950/80">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <div class="flex items-center gap-2">
        <div class="h-9 w-9 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500 shadow-soft"></div>
        <div>
          <div class="text-xs font-semibold uppercase tracking-wide text-zinc-500">Nexus Resolve</div>
          <div class="text-sm font-semibold">Distributor portal</div>
        </div>
      </div>
      <nav class="flex gap-3 text-sm font-medium">
        <a href="{% url 'portal_home' %}" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-300">Home</a>
        <a href="{% url 'portal_claims' %}" class="text-zinc-600 hover:text-zinc-900 dark:text-zinc-300">Claims</a>
        <a href="{% url 'portal_claim_submit' %}" class="rounded-xl bg-zinc-900 px-3 py-1.5 text-white dark:bg-white dark:text-zinc-900">New claim</a>
        <a href="{% url 'logout' %}" class="text-zinc-500">Sign out</a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-4 py-10">
    {% block main %}{% endblock %}
  </main>
</div>
{% endblock %}
