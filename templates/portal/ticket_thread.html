{% extends "portal/base_portal.html" %}
{% block main %}
<h1 class="text-2xl font-semibold">{{ ticket.public_id }}</h1>
<p class="text-sm text-zinc-500">{{ ticket.subject }}</p>
<div class="mt-6 space-y-3">
  {% for m in messages %}
  {% if not m.is_internal %}
  <div class="rounded-2xl border border-zinc-200 bg-white p-4 text-sm dark:border-zinc-800 dark:bg-zinc-900">
    <div class="text-xs text-zinc-500">{{ m.created_at }}</div>
    <div class="mt-1 whitespace-pre-wrap">{{ m.body }}</div>
  </div>
  {% endif %}
  {% endfor %}
</div>
<form method="post" class="mt-6 space-y-3">
  {% csrf_token %}
  <textarea name="body" rows="3" class="w-full rounded-2xl border-zinc-200 p-3 text-sm dark:border-zinc-700 dark:bg-zinc-950" placeholder="Message support…"></textarea>
  <button class="rounded-xl bg-zinc-900 px-4 py-2 text-sm font-medium text-white dark:bg-white dark:text-zinc-900">Send</button>
</form>
{% endblock %}
