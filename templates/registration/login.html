{% extends "base.html" %}
{% block body %}
<div class="flex min-h-full items-center justify-center bg-zinc-50 px-4 dark:bg-zinc-950">
  <div class="w-full max-w-md rounded-2xl border border-zinc-200/80 bg-white p-8 shadow-soft dark:border-zinc-800 dark:bg-zinc-900">
    <div class="mb-6 flex items-center gap-3">
      <div class="h-10 w-10 rounded-2xl bg-gradient-to-br from-violet-500 to-fuchsia-500"></div>
      <div>
        <div class="text-xs font-semibold uppercase text-zinc-500">Nexus Resolve</div>
        <div class="text-lg font-semibold">Sign in</div>
      </div>
    </div>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {% if form.non_field_errors %}<div class="text-sm text-rose-600">{{ form.non_field_errors }}</div>{% endif %}
      <div>
        <label class="text-xs font-medium text-zinc-500">Username</label>
        <input name="username" class="mt-1 w-full rounded-xl border border-zinc-200 px-3 py-2 text-sm dark:border-zinc-700 dark:bg-zinc-950" autofocus>
      </div>
      <div>
        <label class="text-xs font-medium text-zinc-500">Password</label>
        <input type="password" name="password" class="mt-1 w-full rounded-xl border border-zinc-200 px-3 py-2 text-sm dark:border-zinc-700 dark:bg-zinc-950">
      </div>
      <button class="w-full rounded-xl bg-zinc-900 py-2.5 text-sm font-semibold text-white dark:bg-white dark:text-zinc-900">Continue</button>
    </form>
  </div>
</div>
{% endblock %}
