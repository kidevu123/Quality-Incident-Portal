# Nexus Resolve — production stack (Docker Compose v2)
# Load `.env` from this directory (Compose substitutes variables from it automatically).

name: nexus-resolve

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Inside Docker, Redis is always the `redis` service (override a dev .env that says localhost).
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_volume:/app/media
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live/', timeout=5).read()",
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    build: .
    restart: unless-stopped
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "2"]
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - media_volume:/app/media

  beat:
    build: .
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "config",
        "beat",
        "-l",
        "info",
        "--schedule",
        "/var/lib/celery/beat-schedule",
      ]
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - celery_beat_data:/var/lib/celery

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "${NEXUS_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume:/media
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  media_volume:
  celery_beat_data:
