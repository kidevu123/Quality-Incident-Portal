services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://nexus:nexus@db:5432/nexus
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,web,nginx
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_volume:/app/media
    expose:
      - "8000"

  worker:
    build: .
    env_file: .env
    command: celery -A config worker -l info
    environment:
      DATABASE_URL: postgres://nexus:nexus@db:5432/nexus
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - media_volume:/app/media

  beat:
    build: .
    env_file: .env
    command: celery -A config beat -l info
    environment:
      DATABASE_URL: postgres://nexus:nexus@db:5432/nexus
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - redis

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume:/media
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  media_volume:
